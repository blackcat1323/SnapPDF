<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ff4d4d, #ff7a18);
      color: white;
      width: 240px;
      padding: 16px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4d4d;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.98);
    }

    .footer {
      margin-top: 12px;
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">SnapPDF</div>
    <div class="subtitle">Smart capture clean PDF</div>

    <button id="run">Generate PDF</button>

    <div class="footer">Works with Drive, blob, canvas</div>    
    <div id="status" class="status"></div>

    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
